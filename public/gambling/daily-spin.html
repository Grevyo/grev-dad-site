<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Spin | Grev.dad Casino</title>
  <link rel="stylesheet" href="/styles/site.css" />
  <script src="/scripts/header.js" defer></script>
  <script src="/scripts/casino-chat-widget.js" defer></script>
  <style>
    .page-grid { display: grid; gap: 20px; }
    .top-links { display: flex; flex-wrap: wrap; gap: 12px; }
    .daily-spin-layout { display: grid; grid-template-columns: minmax(320px, 420px) minmax(0, 1fr); gap: 24px; align-items: start; }
    .wheel-wrap { display: grid; place-items: center; gap: 18px; }
    .wheel-pointer { width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid #ffd86b; filter: drop-shadow(0 10px 18px rgba(0,0,0,0.45)); }
    .wheel-frame {
      padding: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.28), transparent 32%), linear-gradient(135deg, #f8c444, #ff8f3f 48%, #c2410c);
      box-shadow: 0 28px 70px rgba(0,0,0,0.34), inset 0 0 0 3px rgba(255,255,255,0.22);
    }
    .wheel {
      --rotation: 0deg;
      width: min(360px, 72vw);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 10px solid rgba(15, 20, 30, 0.55);
      box-shadow: inset 0 0 0 8px rgba(255,255,255,0.08), inset 0 0 40px rgba(0,0,0,0.18);
      background: conic-gradient(
        from -90deg,
        #ff6b6b 0deg 90deg,
        #ffd166 90deg 180deg,
        #4ade80 180deg 270deg,
        #60a5fa 270deg 360deg
      );
      position: relative;
      transform: rotate(var(--rotation));
      transition: transform 5.2s cubic-bezier(0.12, 0.8, 0.18, 1);
      overflow: hidden;
    }
    .wheel::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.24);
    }
    .wheel::after {
      content: "SPIN";
      position: absolute;
      inset: 50%;
      width: 96px;
      height: 96px;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22), transparent 30%), rgba(8, 12, 20, 0.96);
      border: 5px solid rgba(255,255,255,0.12);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .wheel-segment {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 40%;
      transform-origin: 0 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }
    .wheel-segment span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(10, 14, 24, 0.72);
      border: 1px solid rgba(255,255,255,0.14);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      transform: translate(30px, -50%) rotate(90deg);
      box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    }
    .spin-card, .reward-card { display: grid; gap: 14px; padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border); background: color-mix(in srgb, var(--surface) 92%, transparent); }
    .spin-result { min-height: 28px; font-weight: 700; }
    .spin-meta, .info-copy, .reward-chip__copy { color: var(--muted); line-height: 1.7; }
    .reward-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
    .reward-chip { padding: 14px; border-radius: 16px; border: 1px solid var(--border); background: linear-gradient(135deg, color-mix(in srgb, var(--surface) 96%, transparent), color-mix(in srgb, var(--bg-soft) 84%, transparent)); }
    .reward-chip strong { display: block; margin-bottom: 6px; font-size: 1.05rem; }
    @media (max-width: 900px) {
      .daily-spin-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div id="header-mount"></div>
    <main class="page-main page-grid">
      <div class="top-links">
        <a class="btn" href="/gambling/index.html">← Back to Casino Hub</a>
      </div>

      <section class="panel daily-spin-layout">
        <div class="wheel-wrap">
          <div class="wheel-pointer" aria-hidden="true"></div>
          <div class="wheel-frame">
            <div id="daily-spin-wheel" class="wheel" aria-label="Daily Grev Coin spin wheel"></div>
          </div>
        </div>
        <div class="spin-card">
          <div>
            <p class="eyebrow">Daily reward</p>
            <h1 class="panel-title">Daily Free Spin</h1>
            <p class="info-copy">
              One free spin every 24 hours. The wheel can land on 5, 10, 50, or 100 Grev Coin,
              and every reward keeps the same 25% chance.
            </p>
          </div>
          <div class="button-row">
            <button id="daily-spin-btn" class="btn btn-primary" type="button">Spin the wheel</button>
          </div>
          <p id="daily-spin-status" class="spin-result">Sign in to spin.</p>
          <p id="daily-spin-meta" class="spin-meta"></p>
          <div class="reward-grid" aria-label="Daily spin rewards">
            <div class="reward-chip"><strong>5 GC</strong><span class="reward-chip__copy">Warm-up coins.</span></div>
            <div class="reward-chip"><strong>10 GC</strong><span class="reward-chip__copy">A tidy little top-up.</span></div>
            <div class="reward-chip"><strong>50 GC</strong><span class="reward-chip__copy">A very nice hit.</span></div>
            <div class="reward-chip"><strong>100 GC</strong><span class="reward-chip__copy">Big daily jackpot vibes.</span></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const spinButton = document.getElementById("daily-spin-btn");
    const spinStatusEl = document.getElementById("daily-spin-status");
    const spinMetaEl = document.getElementById("daily-spin-meta");
    const wheelEl = document.getElementById("daily-spin-wheel");

    const rewards = [5, 10, 50, 100];
    const segmentAngle = 360 / rewards.length;
    let isSpinning = false;
    let currentRotation = 0;
    let latestSpinState = null;

    function formatGc(value) {
      const amount = Number(value || 0);
      return `${amount.toLocaleString("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} GC`;
    }

    function updateCasinoBalance(balance) {
      const formatted = formatGc(balance || 0);
      if (typeof window.writeCasinoBalance === "function") {
        window.writeCasinoBalance({
          formatted,
          value: Number(balance || 0),
          updated_at: Date.now()
        });
      }
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString("en-GB", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function buildWheel() {
      wheelEl.innerHTML = rewards.map((reward, index) => {
        const rotation = index * segmentAngle;
        return `<div class="wheel-segment" style="transform: rotate(${rotation}deg)"><span>${reward} GC</span></div>`;
      }).join("");
    }

    function setSpinState(data) {
      latestSpinState = data || null;
      if (!data) {
        spinButton.disabled = true;
        spinStatusEl.textContent = "Sign in to spin.";
        spinMetaEl.textContent = "";
        return;
      }

      const available = Boolean(data.available);
      spinButton.disabled = !available || isSpinning;
      spinStatusEl.textContent = available ? "Your free daily spin is ready." : "Daily spin already used.";
      spinMetaEl.textContent = available
        ? "Come back after your next 24-hour cooldown once you spin."
        : `Next free spin: ${formatDate(data.next_available_at) || "waiting for timer"}`;
    }

    async function loadCasinoProfile() {
      const user = await window.fetchCurrentUser({ preferCache: true });
      if (!user) {
        if (typeof window.writeCasinoBalance === "function") window.writeCasinoBalance(null);
        setSpinState(null);
        return;
      }

      try {
        const response = await fetch("/api/casino/profile", { credentials: "same-origin" });
        const data = await response.json();
        if (!response.ok || !data?.success) throw new Error(data?.error || "Failed to load casino profile");

        updateCasinoBalance(data?.profile?.grev_coin_balance || 0);
        setSpinState(data?.daily_spin || null);
      } catch (error) {
        console.error(error);
        spinStatusEl.textContent = "Could not load spin status.";
      }
    }

    function animateWheelToReward(rewardCoins) {
      const rewardIndex = rewards.indexOf(Number(rewardCoins));
      if (rewardIndex < 0) return Promise.resolve();

      const centerAngle = (rewardIndex * segmentAngle) + (segmentAngle / 2);
      const targetRotation = (360 * 6) + (360 - centerAngle);
      currentRotation += targetRotation;
      wheelEl.style.setProperty("--rotation", `${currentRotation}deg`);

      return new Promise((resolve) => {
        window.setTimeout(resolve, 5300);
      });
    }

    async function handleDailySpin() {
      if (isSpinning) return;
      isSpinning = true;
      spinButton.disabled = true;
      spinStatusEl.textContent = "Spinning...";
      spinMetaEl.textContent = "Good luck.";

      try {
        const response = await fetch("/api/casino/daily-spin", {
          method: "POST",
          credentials: "same-origin"
        });
        const data = await response.json().catch(() => null);

        if (!response.ok || !data?.success) {
          setSpinState(data?.daily_spin || null);
          throw new Error(data?.error || "Daily spin failed");
        }

        await animateWheelToReward(data.reward?.coins || 0);
        updateCasinoBalance(data?.profile?.grev_coin_balance || 0);
        spinStatusEl.textContent = `You won ${formatGc(data?.reward?.coins || 0)}.`;
        spinMetaEl.textContent = `Next free spin: ${formatDate(data?.daily_spin?.next_available_at) || "in 24 hours"}`;
        setSpinState(data?.daily_spin || null);
      } catch (error) {
        console.error(error);
        spinStatusEl.textContent = error.message || "Daily spin failed.";
      } finally {
        isSpinning = false;
        setSpinState(latestSpinState);
      }
    }

    buildWheel();
    spinButton.addEventListener("click", handleDailySpin);
    document.addEventListener("DOMContentLoaded", loadCasinoProfile);
  </script>
</body>
</html>
