<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Grev.dad</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f5f7fa;
    }

    .wrap {
      max-width: 1100px;
      margin: 40px auto;
      padding: 24px;
    }

    .box {
      background: #161b22;
      border: 1px solid #222831;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .user-card,
    .post-card {
      background: #0f141a;
      border: 1px solid #222831;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      margin-right: 8px;
      transition: opacity 0.2s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-approve { background: #22c55e; color: #08110b; }
    .btn-reject { background: #ef4444; color: white; }
    .btn-remove { background: #f97316; color: white; }
    .btn-sync { background: #3b82f6; color: white; }
    .btn-seed { background: #8b5cf6; color: white; }

    /* Case Editor Styles */
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #b8c0cc; font-size: 0.9rem; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #222831;
      background: #0f141a;
      color: white;
      margin-bottom: 10px;
    }

    #searchResults {
      background: #080a0d;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #222831;
    }

    .search-item {
      padding: 10px;
      border-bottom: 1px solid #161b22;
      cursor: pointer;
    }

    .search-item:hover { background: #1c2128; }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .skin-pill {
      background: #222831;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .skin-pill span { color: #ef4444; cursor: pointer; font-weight: bold; }
    
    .admin-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="wrap">
    <div class="box">
      <h1>Admin Panel</h1>
      <p>Manage users, forum posts, and create custom cases.</p>
      
      <div class="admin-actions">
        <button id="syncBtn" class="btn btn-sync" onclick="syncPrices()">🔄 Sync Steam Prices</button>
        <button id="seedBtn" class="btn btn-seed" onclick="megaSeed()">🚀 Mega Seed Database</button>
      </div>
    </div>

    <div class="box">
      <h2>Case Builder</h2>
      <div class="input-group">
        <label>Case Name</label>
        <input type="text" id="caseName" placeholder="e.g., Cobalt Collection">
      </div>
      <div class="input-group">
        <label>Unbox Price ($)</label>
        <input type="number" id="casePrice" placeholder="2.50" step="0.01">
      </div>

      <div class="input-group">
        <label>Add Skins (Search Global Collection)</label>
        <input type="text" id="skinSearch" placeholder="Type skin name..." oninput="handleSearch()">
        <div id="searchResults"></div>
      </div>

      <div id="selectedSkinsContainer">
        <label>Skins in this Case:</label>
        <div class="pill-list" id="selectedSkinsList"></div>
      </div>

      <button class="btn btn-approve" style="width: 100%; margin-top: 20px;" onclick="saveCustomCase()">💾 Save Custom Case</button>
    </div>

    <div class="box">
      <h2>Pending Accounts</h2>
      <div id="pendingUsers">Loading...</div>
    </div>

    <div class="box">
      <h2>Forum Posts</h2>
      <div id="forumPosts">Loading...</div>
    </div>
  </div>

  <script src="/header.js"></script>
  <script>
    let selectedSkins = [];

    // --- SYSTEM ACTIONS ---
    async function syncPrices() {
      const btn = document.getElementById('syncBtn');
      btn.disabled = true;
      btn.innerText = "Syncing...";
      
      const res = await fetch("/api/admin/sync-prices", { method: "POST" });
      if (res.ok) {
        alert("Price sync started in background!");
      }
      btn.disabled = false;
      btn.innerText = "🔄 Sync Steam Prices";
    }

    async function megaSeed() {
      if (!confirm("This will fetch thousands of skins. Continue?")) return;
      const btn = document.getElementById('seedBtn');
      btn.disabled = true;
      btn.innerText = "Seeding... (Wait 30s)";
      
      const res = await fetch("/api/admin/mega-seed");
      const data = await res.json();
      
      if (res.ok) {
        alert(data.message);
      } else {
        alert("Error: " + data.error);
      }
      btn.disabled = false;
      btn.innerText = "🚀 Mega Seed Database";
    }

    // --- CASE EDITOR LOGIC ---
    async function handleSearch() {
      const query = document.getElementById('skinSearch').value;
      const resultsDiv = document.getElementById('searchResults');
      
      if (query.length < 3) {
        resultsDiv.innerHTML = "";
        return;
      }

      // Query the Global Collection
      const res = await fetch(`/api/cases/skins?name=Global%20Collection`);
      const data = await res.json();
      
      if (!data.skins) return;

      const filtered = data.skins.filter(s => 
        s.skin_name.toLowerCase().includes(query.toLowerCase()) || 
        s.weapon_type.toLowerCase().includes(query.toLowerCase())
      ).slice(0, 8);

      resultsDiv.innerHTML = filtered.map(s => `
        <div class="search-item" onclick="addSkin('${s.weapon_type}', '${s.skin_name}', ${s.base_price}, '${s.rarity}')">
          ${s.weapon_type} | ${s.skin_name} ($${s.base_price})
        </div>
      `).join('');
    }

    function addSkin(weapon, skin, price, rarity) {
      if (selectedSkins.find(s => s.skin === skin && s.weapon === weapon)) return;
      
      selectedSkins.push({ weapon, skin, price, rarity });
      document.getElementById('skinSearch').value = "";
      document.getElementById('searchResults').innerHTML = "";
      renderSkins();
    }

    function removeSkin(index) {
      selectedSkins.splice(index, 1);
      renderSkins();
    }

    function renderSkins() {
      const list = document.getElementById('selectedSkinsList');
      list.innerHTML = selectedSkins.map((s, i) => `
        <div class="skin-pill">
          ${s.weapon} | ${s.skin} 
          <span onclick="removeSkin(${i})">×</span>
        </div>
      `).join('');
    }

    async function saveCustomCase() {
      const name = document.getElementById('caseName').value;
      const price = document.getElementById('casePrice').value;

      if (!name || !price || selectedSkins.length === 0) {
        alert("Please fill in all fields and add at least one skin.");
        return;
      }

      const res = await fetch("/api/admin/create-case", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, price, skins: selectedSkins })
      });

      if (res.ok) {
        alert("Case created successfully!");
        location.reload();
      }
    }

    // --- USER MANAGEMENT ---
    async function approveUser(userId) {
      const res = await fetch(`/api/admin/approve-user?id=${userId}`, { method: "POST" });
      if (res.ok) loadPendingUsers();
    }

    async function loadPendingUsers() {
      const res = await fetch("/api/admin/pending", { credentials: "include" });
      const wrap = document.getElementById("pendingUsers");
      if (!res.ok) { wrap.innerHTML = "<p>Error loading.</p>"; return; }
      const data = await res.json();
      wrap.innerHTML = data.pending.length ? "" : "<p>No pending users.</p>";
      data.pending.forEach(user => {
        const div = document.createElement("div");
        div.className = "user-card";
        div.innerHTML = `<h3>${user.username}</h3><p>${user.created_at}</p>
          <button class="btn btn-approve" onclick="approveUser('${user.id}')">Approve</button>`;
        wrap.appendChild(div);
      });
    }

    async function loadForumPosts() {
      const res = await fetch("/api/admin/forum-posts", { credentials: "include" });
      const wrap = document.getElementById("forumPosts");
      if (!res.ok) { wrap.innerHTML = "<p>No posts found.</p>"; return; }
      const data = await res.json();
      wrap.innerHTML = data.posts.length ? "" : "<p>No posts.</p>";
      data.posts.forEach(post => {
        const div = document.createElement("div");
        div.className = "post-card";
        div.innerHTML = `<h3>${post.subject}</h3><p>By ${post.author_username}</p>
          <button class="btn btn-remove" onclick="removePost(${post.id})">Remove</button>`;
        wrap.appendChild(div);
      });
    }

    loadPendingUsers();
    loadForumPosts();
  </script>
</body>
</html>
