<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post - Grev.dad</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f5f7fa;
    }
    .wrap {
      max-width: 1000px;
      margin: 40px auto;
      padding: 24px;
    }
    .box {
      background: #161b22;
      border: 1px solid #222831;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .comment {
      background: #0f141a;
      border: 1px solid #222831;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #222831;
      background: #0f141a;
      color: #f5f7fa;
      margin-bottom: 12px;
    }
    button {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      background: #9ecbff;
      color: #0f1115;
      cursor: pointer;
    }
    img {
      max-width: 100%;
      border-radius: 14px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="wrap">
    <div class="box" id="postBox">Loading post...</div>

    <div class="box">
      <h2>Comments</h2>
      <div id="commentsWrap">Loading comments...</div>
    </div>

    <div class="box">
      <h2>Add Comment</h2>
      <form id="commentForm">
        <textarea id="commentText" placeholder="Write a comment..." required></textarea>
        <button type="submit">Comment</button>
      </form>
    </div>
  </div>

  <script src="/header.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const postId = params.get("id");  // Get post id from URL

    async function loadPost() {
      if (!postId) {
        document.getElementById("postBox").innerHTML = "<p>Post not found.</p>";
        return;
      }

      const res = await fetch("/api/forum/post?id=" + encodeURIComponent(postId), { credentials: "include" });
      const data = await res.json();

      const box = document.getElementById("postBox");
      if (!data.post) {
        box.innerHTML = "<p>Post not found.</p>";
        return;
      }

      box.innerHTML = `
        <h1>${data.post.subject}</h1>
        <p>By ${data.post.author_username} · ${data.post.created_at}</p>
        <p>${data.post.description}</p>
        ${data.post.image_url ? `<img src="${data.post.image_url}" alt="Post image">` : ""}
      `;
    }

    async function loadComments() {
      const res = await fetch("/api/forum/comments?post_id=" + encodeURIComponent(postId), { credentials: "include" });
      const data = await res.json();

      const wrap = document.getElementById("commentsWrap");
      wrap.innerHTML = "";

      if (!data.comments.length) {
        wrap.innerHTML = "<p>No comments yet.</p>";
        return;
      }

      for (const comment of data.comments) {
        const div = document.createElement("div");
        div.className = "comment";
        div.innerHTML = `
          <strong>${comment.author_username}</strong>
          <p>${comment.comment}</p>
          <small>${comment.created_at}</small>
        `;
        wrap.appendChild(div);
      }
    }

    // Post and comment handlers
    document.getElementById("commentForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const comment = document.getElementById("commentText").value.trim();

      const res = await fetch("/api/forum/create-comment", {
        method: "POST",
        credentials: "include",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ post_id: postId, comment })
      });

      if (res.ok) {
        document.getElementById("commentText").value = "";
        loadComments();
      }
    });

    loadPost();
    loadComments();
  </script>
</body>
</html>
