<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum Thread | Grev.dad</title>
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <script src="/assets/js/main.js" defer></script>
  <style>
    .thread-title {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.15;
    }

    .thread-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 18px;
    }

    .thread-image {
      width: 100%;
      max-height: 460px;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-bottom: 18px;
      background: rgba(255,255,255,0.03);
    }

    .thread-body {
      white-space: pre-wrap;
      line-height: 1.65;
      font-size: 1rem;
      color: var(--text);
    }

    .thread-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .comments-list {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .comment-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.02);
      padding: 16px;
    }

    .comment-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 10px;
    }

    .comment-body {
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .empty-box {
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 22px;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div id="header-mount"></div>

    <main class="page-main">
      <section class="panel">
        <div id="thread-message" class="hidden"></div>

        <h1 id="thread-title" class="thread-title">Loading thread...</h1>
        <div id="thread-meta" class="thread-meta"></div>
        <div id="thread-image-wrap"></div>
        <div id="thread-body" class="thread-body"></div>

        <div class="thread-actions">
          <button id="like-btn" class="btn" type="button">👍 Like</button>
          <button id="dislike-btn" class="btn" type="button">👎 Dislike</button>
          <button id="remove-btn" class="btn hidden" type="button">Remove post</button>
          <a class="btn" href="/forum.html">Back to forum</a>
        </div>
      </section>

      <section class="panel mt-24">
        <h2 class="panel-title">Comments</h2>
        <p class="panel-subtitle">Join the discussion below.</p>

        <form id="comment-form" class="form-grid hidden">
          <div class="form-group">
            <label class="form-label" for="comment-input">Write a comment</label>
            <textarea
              id="comment-input"
              class="form-input form-textarea"
              maxlength="3000"
              placeholder="Write your comment..."
            ></textarea>
          </div>

          <div class="button-row">
            <button id="comment-submit-btn" class="btn btn-primary" type="submit">Post comment</button>
          </div>
        </form>

        <div id="comment-login-note" class="alert alert-info">
          Log in to react to posts and add comments.
        </div>

        <div id="comments-list" class="comments-list">
          <div class="empty-box">Loading comments...</div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">Grev.dad — forum thread</div>
    </footer>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const postId = Number(params.get("id") || "");

    let currentUser = null;
    let currentPost = null;

    const threadMessage = document.getElementById("thread-message");
    const threadTitle = document.getElementById("thread-title");
    const threadMeta = document.getElementById("thread-meta");
    const threadImageWrap = document.getElementById("thread-image-wrap");
    const threadBody = document.getElementById("thread-body");
    const likeBtn = document.getElementById("like-btn");
    const dislikeBtn = document.getElementById("dislike-btn");
    const removeBtn = document.getElementById("remove-btn");
    const commentForm = document.getElementById("comment-form");
    const commentInput = document.getElementById("comment-input");
    const commentSubmitBtn = document.getElementById("comment-submit-btn");
    const commentLoginNote = document.getElementById("comment-login-note");
    const commentsList = document.getElementById("comments-list");

    function showMessage(type, text) {
      threadMessage.className = `alert alert-${type}`;
      threadMessage.textContent = text;
    }

    function clearMessage() {
      threadMessage.className = "hidden";
      threadMessage.textContent = "";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatDate(value) {
      if (!value) return "—";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "—";
      return date.toLocaleString("en-GB", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function fetchCurrentUser() {
      try {
        const response = await fetch("/api/auth/me", {
          method: "GET",
          credentials: "same-origin"
        });

        const data = await response.json().catch(() => null);
        if (!response.ok || !data?.authenticated) return null;
        return data.user || null;
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    function renderThread(post) {
      currentPost = post;

      threadTitle.textContent = post.title || "Untitled post";
      threadMeta.innerHTML = `
        <span>By ${escapeHtml(post.author_username || "Unknown")}</span>
        <span>${escapeHtml(post.author_group || "Member")}</span>
        <span>${escapeHtml(formatDate(post.created_at))}</span>
        <span>👍 ${Number(post.like_count || 0)}</span>
        <span>👎 ${Number(post.dislike_count || 0)}</span>
        <span>💬 ${Number(post.comment_count || 0)}</span>
      `;

      if (post.image_url) {
        threadImageWrap.innerHTML = `
          <img class="thread-image" src="${escapeHtml(post.image_url)}" alt="Thread image" />
        `;
      } else {
        threadImageWrap.innerHTML = "";
      }

      threadBody.textContent = post.body || "";

      likeBtn.textContent = post.user_reaction === "like" ? "👍 Liked" : "👍 Like";
      dislikeBtn.textContent = post.user_reaction === "dislike" ? "👎 Disliked" : "👎 Dislike";

      if (post.can_remove) {
        removeBtn.classList.remove("hidden");
      } else {
        removeBtn.classList.add("hidden");
      }
    }

    function renderComments(comments) {
      if (!Array.isArray(comments) || comments.length === 0) {
        commentsList.innerHTML = `<div class="empty-box">No comments yet.</div>`;
        return;
      }

      commentsList.innerHTML = comments.map((comment) => `
        <article class="comment-card">
          <div class="comment-meta">
            <span>${escapeHtml(comment.author_username || "Unknown")}</span>
            <span>${escapeHtml(comment.author_group || "Member")}</span>
            <span>${escapeHtml(formatDate(comment.created_at))}</span>
          </div>
          <div class="comment-body">${escapeHtml(comment.comment || "")}</div>
        </article>
      `).join("");
    }

    async function loadThread() {
      clearMessage();

      if (!Number.isInteger(postId) || postId <= 0) {
        showMessage("error", "Invalid post id.");
        return;
      }

      try {
        const response = await fetch(`/api/forum/post?id=${encodeURIComponent(postId)}`, {
          method: "GET",
          credentials: "same-origin"
        });

        const data = await response.json().catch(() => null);

        if (!response.ok || !data?.success) {
          showMessage("error", data?.error || "Failed to load thread.");
          return;
        }

        renderThread(data.post);
      } catch (error) {
        console.error(error);
        showMessage("error", "Could not load thread.");
      }
    }

    async function loadComments() {
      try {
        const response = await fetch(`/api/forum/comments?post_id=${encodeURIComponent(postId)}`, {
          method: "GET",
          credentials: "same-origin"
        });

        const data = await response.json().catch(() => null);

        if (!response.ok || !data?.success) {
          renderComments([]);
          return;
        }

        renderComments(data.comments || []);
      } catch (error) {
        console.error(error);
        renderComments([]);
      }
    }

    async function sendReaction(reactionType) {
      if (!currentUser) {
        showMessage("error", "You need to be logged in to react.");
        return;
      }

      try {
        const response = await fetch("/api/forum/react", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "same-origin",
          body: JSON.stringify({
            post_id: postId,
            reaction_type: reactionType
          })
        });

        const data = await response.json().catch(() => null);

        if (!response.ok || !data?.success) {
          showMessage("error", data?.error || "Failed to update reaction.");
          return;
        }

        await loadThread();
      } catch (error) {
        console.error(error);
        showMessage("error", "Could not update reaction.");
      }
    }

    async function submitComment(event) {
      event.preventDefault();

      const comment = commentInput.value.trim();
      if (!comment) {
        showMessage("error", "Comment cannot be empty.");
        return;
      }

      commentSubmitBtn.disabled = true;
      commentSubmitBtn.textContent = "Posting...";

      try {
        const response = await fetch("/api/forum/create-comment", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "same-origin",
          body: JSON.stringify({
            post_id: postId,
            comment
          })
        });

        const data = await response.json().catch(() => null);

        if (!response.ok || !data?.success) {
          showMessage("error", data?.error || "Failed to add comment.");
          return;
        }

        commentInput.value = "";
        await loadThread();
        await loadComments();
      } catch (error) {
        console.error(error);
        showMessage("error", "Could not add comment.");
      } finally {
        commentSubmitBtn.disabled = false;
        commentSubmitBtn.textContent = "Post comment";
      }
    }

    async function removePost() {
      if (!currentPost?.can_remove) return;

      const confirmed = window.confirm("Remove this post?");
      if (!confirmed) return;

      try {
        const response = await fetch("/api/forum/remove-post", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "same-origin",
          body: JSON.stringify({
            post_id: postId
          })
        });

        const data = await response.json().catch(() => null);

        if (!response.ok || !data?.success) {
          showMessage("error", data?.error || "Failed to remove post.");
          return;
        }

        window.location.href = "/forum.html";
      } catch (error) {
        console.error(error);
        showMessage("error", "Could not remove post.");
      }
    }

    async function initPage() {
      currentUser = await fetchCurrentUser();

      if (currentUser) {
        commentForm.classList.remove("hidden");
        commentLoginNote.classList.add("hidden");
      } else {
        commentForm.classList.add("hidden");
        commentLoginNote.classList.remove("hidden");
      }

      await loadThread();
      await loadComments();
    }

    likeBtn.addEventListener("click", () => sendReaction("like"));
    dislikeBtn.addEventListener("click", () => sendReaction("dislike"));
    removeBtn.addEventListener("click", removePost);
    commentForm.addEventListener("submit", submitComment);
    document.addEventListener("DOMContentLoaded", initPage);
  </script>
</body>
</html>
