<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Grev.dad</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f5f7fa;
    }

    .wrap {
      max-width: 1100px;
      margin: 40px auto;
      padding: 24px;
    }

    .box {
      background: #161b22;
      border: 1px solid #222831;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .user-card,
    .post-card {
      background: #0f141a;
      border: 1px solid #222831;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      margin-right: 8px;
      transition: opacity 0.2s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-approve { background: #22c55e; color: #08110b; }
    .btn-reject { background: #ef4444; color: white; }
    .btn-remove { background: #f97316; color: white; }
    
    /* Style for the Mega Seed button */
    .btn-seed { 
      background: #ffae00; 
      color: #111; 
      width: 100%; 
      font-size: 1.1rem;
      padding: 15px;
      margin-top: 10px;
    }

    #seed-status {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #ffae00;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="wrap">
    <div class="box">
      <h1>Admin Panel</h1>
      <p>Approve or reject pending accounts, manage forum posts, and sync case data.</p>
    </div>

    <div class="box">
      <h2>Case Management</h2>
      <p>Fetch latest skin data and prices from Pricempire API. This will populate the "Global Collection" case.</p>
      <button id="seedBtn" class="btn btn-seed" onclick="runMegaSeed()">🚀 Run Mega Seed (Sync Global Skins)</button>
      <div id="seed-status"></div>
    </div>

    <div class="box">
      <h2>Pending Accounts</h2>
      <div id="pendingUsers">Loading...</div>
    </div>

    <div class="box">
      <h2>Forum Posts</h2>
      <div id="forumPosts">Loading...</div>
    </div>
  </div>

  <script src="/header.js"></script>
  <script>
    // --- NEW: MEGA SEED LOGIC ---
    async function runMegaSeed() {
      const btn = document.getElementById('seedBtn');
      const status = document.getElementById('seed-status');
      
      if (!confirm("This will fetch thousands of skins and update prices. It may take up to 30 seconds. Continue?")) return;

      btn.disabled = true;
      btn.innerText = "⏳ Syncing Database...";
      status.innerText = "Requesting data from Pricempire API... please wait.";

      try {
        const res = await fetch("/api/admin/mega-seed", { credentials: "include" });
        const data = await res.json();

        if (data.success) {
          status.style.color = "#22c55e";
          status.innerText = `✅ Success! ${data.message}`;
        } else {
          throw new Error(data.error || "Unknown error occurred");
        }
      } catch (err) {
        status.style.color = "#ef4444";
        status.innerText = `❌ Error: ${err.message}`;
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.innerText = "🚀 Run Mega Seed (Sync Global Skins)";
      }
    }

    // --- EXISTING ADMIN LOGIC ---
    async function loadPendingUsers() {
      const res = await fetch("/api/admin/pending", { credentials: "include" });
      const wrap = document.getElementById("pendingUsers");

      if (!res.ok) {
        wrap.innerHTML = "<p>Unable to load pending users.</p>";
        return;
      }

      const data = await res.json();
      wrap.innerHTML = "";

      if (!data.pending || !data.pending.length) {
        wrap.innerHTML = "<p>No pending users.</p>";
        return;
      }

      for (const user of data.pending) {
        const div = document.createElement("div");
        div.className = "user-card";
        div.innerHTML = `
          <h3>${user.username}</h3>
          <p>Created: ${user.created_at}</p>
          <button class="btn btn-approve" onclick="approveUser('${user.id}')">Approve</button>
          <button class="btn btn-reject" onclick="rejectUser('${user.id}')">Reject</button>
        `;
        wrap.appendChild(div);
      }
    }

    // Note: I updated the approve/reject to use user.id to match your index.js needs
    async function approveUser(userId) {
      await fetch("/api/admin/approve-user", {
        method: "POST",
        credentials: "include",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ user_id: userId })
      });
      loadPendingUsers();
    }

    async function rejectUser(userId) {
      await fetch("/api/admin/reject-user", {
        method: "POST",
        credentials: "include",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ user_id: userId })
      });
      loadPendingUsers();
    }

    async function loadForumPosts() {
      const res = await fetch("/api/admin/forum-posts", { credentials: "include" });
      const wrap = document.getElementById("forumPosts");

      if (!res.ok) {
        wrap.innerHTML = "<p>Unable to load forum posts.</p>";
        return;
      }

      const data = await res.json();
      wrap.innerHTML = "";

      if (!data.posts || !data.posts.length) {
        wrap.innerHTML = "<p>No forum posts found.</p>";
        return;
      }

      for (const post of data.posts) {
        const div = document.createElement("div");
        div.className = "post-card";
        div.innerHTML = `
          <h3>${post.subject}</h3>
          <p>By ${post.author_username} · ${post.created_at}</p>
          <button class="btn btn-remove" onclick="removePost(${post.id})">Remove Post</button>
        `;
        wrap.appendChild(div);
      }
    }

    async function removePost(postId) {
      const ok = confirm("Remove this forum post?");
      if (!ok) return;

      await fetch("/api/admin/remove-post", {
        method: "POST",
        credentials: "include",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ post_id: postId })
      });

      loadForumPosts();
    }

    loadPendingUsers();
    loadForumPosts();
  </script>
</body>
</html>
