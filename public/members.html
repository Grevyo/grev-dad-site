<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members - Grev.dad</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f5f7fa;
    }

    .wrap {
      max-width: 900px;
      margin: 50px auto;
      padding: 24px;
    }

    .box {
      background: #161b22;
      border: 1px solid #222831;
      border-radius: 18px;
      padding: 24px;
    }

    a {
      color: #9ecbff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <h1>Members Area</h1>
      <p id="welcome">Loading...</p>
      <p><a href="/profile.html">Go to profile</a></p>
      <p><a href="/api/logout">Log out</a></p>
    </div>
  </div>

  <script>
    async function loadUser() {
      const res = await fetch("/api/me");
      if (!res.ok) {
        window.location.href = "/login.html?msg=Please%20log%20in.";
        return;
      }

      const data = await res.json();
      document.getElementById("welcome").textContent =
        "Welcome, " + data.user.username + ". You are logged in.";
    }

    loadUser();
  </script>
</body>
</html>
