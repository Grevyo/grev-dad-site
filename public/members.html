<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members - Grev.dad</title>
  <style>
    .hidden { display: none !important; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0f1115; color: #f5f7fa; }
    
    .wrap { max-width: 1100px; margin: 40px auto; padding: 24px; }
    .box { background: #161b22; border: 1px solid #222831; border-radius: 18px; padding: 24px; margin-bottom: 24px; }
    
    .member-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    
    .member-card { 
      background: #0f141a; 
      border: 1px solid #222831; 
      border-radius: 14px; 
      padding: 18px; 
      position: relative;
      transition: transform 0.2s, border-color 0.2s;
    }
    .member-card:hover { border-color: #9ecbff; transform: translateY(-2px); }

    /* Special style for the #1 player */
    .top-rank { border: 1px solid #ffd700 !important; box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); }

    .rank-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #222831;
      color: #9ecbff;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: bold;
      border: 1px solid #333b45;
    }

    .member-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .member-card h3 { margin: 0; font-size: 1.1rem; }
    
    .member-link {
      color: #f5f7fa;
      text-decoration: none;
      transition: color 0.2s;
    }
    .member-link:hover {
      color: #9ecbff;
      text-decoration: underline;
    }

    .stats-row { 
      margin-top: 12px; 
      padding-top: 12px; 
      border-top: 1px solid #222831; 
      display: flex; 
      justify-content: space-between;
      font-size: 0.9rem;
    }

    .wealth-value { color: #9ecbff; font-weight: bold; }
    .item-count { color: #8f98a3; }

    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .status-online { background: #22c55e; box-shadow: 0 0 8px rgba(34, 197, 94, 0.5); }
    .status-away { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }
    .status-offline { background: #6b7280; }

    .footer { max-width: 1100px; margin: 0 auto; padding: 10px 24px 50px; color: #8f98a3; font-size: 0.92rem; }

    @media (max-width: 700px) { .logo-img { height: 72px; } }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="wrap">
      <div class="box">
        <h1>Grev.dad Leaderboard</h1>
        <p id="welcome">Loading...</p>
      </div>

      <div class="box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0;">Approved Members</h2>
            <span style="font-size: 0.8rem; color: #8f98a3;">Updates every 30s</span>
        </div>
        <div id="memberList" class="member-list"></div>
      </div>
    </div>
  </main>

  <footer class="footer">© Grev.dad — personal projects, playgrounds, and experiments.</footer>

  <script src="/header.js"></script>
  <script>
    function statusClass(status) {
      if (status === "online") return "status-online";
      if (status === "away") return "status-away";
      return "status-offline";
    }

    function statusLabel(status) {
      if (status === "online") return "Online";
      if (status === "away") return "Away";
      return "Offline";
    }

    async function loadPage() {
      try {
        // 1. Authenticate and get current user
        const meRes = await fetch("/api/me");
        if (!meRes.ok) {
          window.location.href = "/login.html?msg=Please%20log%20in.";
          return;
        }

        const meData = await meRes.json();
        document.getElementById("welcome").innerHTML = `Welcome back, <strong style="color: #9ecbff;">${meData.user.username}</strong>. Check the rankings below!`;

        // 2. Load Leaderboard Data
        const membersRes = await fetch("/api/members");
        if (!membersRes.ok) return;

        const membersData = await membersRes.json();
        const list = document.getElementById("memberList");
        list.innerHTML = "";

        membersData.members.forEach((member, index) => {
          const div = document.createElement("div");
          // Apply top-rank class for #1 player
          div.className = `member-card ${index === 0 ? 'top-rank' : ''}`;
          
          const rankColor = index === 0 ? 'style="color: #ffd700; border-color: #ffd700;"' : '';

          // LINK UPDATED TO profile.html
          div.innerHTML = `
            <div class="rank-badge" ${rankColor}>#${index + 1}</div>
            <div class="member-row">
              <span class="status-dot ${statusClass(member.status)}"></span>
              <h3>
                <a href="/profile.html?id=${member.id}" class="member-link">${member.username}</a>
              </h3>
            </div>
            <p style="font-size: 0.85rem; color: #8f98a3;">
              ${member.is_admin ? '<span style="color:#ff4b4b; font-weight:bold;">Admin</span>' : 'Member'} · ${statusLabel(member.status)}
            </p>
            <div class="stats-row">
              <span class="item-count">${member.item_count} Skins</span>
              <span class="wealth-value">$${Number(member.total_wealth).toFixed(2)}</span>
            </div>
          `;
          list.appendChild(div);
        });
      } catch (e) {
        console.error("Leaderboard load failed:", e);
      }
    }

    loadPage();
    // Auto-refresh every 30 seconds to keep statuses and wealth up to date
    setInterval(loadPage, 30000);
  </script>
</body>
</html>
