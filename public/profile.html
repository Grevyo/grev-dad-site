<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Grev.dad</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f5f7fa;
    }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(17, 21, 27, 0.96);
    border-bottom: 1px solid #222831;
  }

  .logo-link {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
  }

  .logo-img {
    height: 95px;
    width: auto;
    display: block;
  }

  .nav {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .nav a {
    color: #f5f7fa;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 600;
    opacity: 0.92;
  }

  .nav a:hover {
    opacity: 1;
    text-decoration: underline;
  }

    .wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
    }

    .box {
      background: #161b22;
      border: 1px solid #222831;
      border-radius: 18px;
      padding: 24px;
    }

    a {
      color: #9ecbff;
    }


    @media (max-width: 700px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .logo-img {
        height: 72px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="logo-link">
      <img src="grev-dad-logo.png" alt="Grev.dad logo" class="logo-img">
    </a>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="profile.html">Profile</a>
      <a href="/api/logout">Log Out</a>
    </nav>
  </header>
  <div class="wrap">
    <div class="box">
      <h1>Profile</h1>
      <p><strong>Username:</strong> <span id="username">Loading...</span></p>
      <p><strong>Joined:</strong> <span id="joined">Loading...</span></p>
      <p><a href="/members.html">Back to members area</a></p>
      <p><a href="/api/logout">Log out</a></p>
    </div>
  </div>

  <script>
    async function loadProfile() {
      const res = await fetch("/api/me");
      if (!res.ok) {
        window.location.href = "/login.html?msg=Please%20log%20in.";
        return;
      }

      const data = await res.json();
      document.getElementById("username").textContent = data.user.username;
      document.getElementById("joined").textContent = data.user.created_at;
    }

    loadProfile();
  </script>
</body>
</html>
