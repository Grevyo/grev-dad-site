name = "grev-dad-worker"
main = "src/index.js" # Point this to your actual index.js location
compatibility_date = "2026-03-21"

# 1. Main Database (Users, Sessions, Inventory)
[[d1_databases]]
binding = "DB"
database_name = "your-main-db-name" # Change to your actual DB name
database_id = "PASTE-YOUR-MAIN-DB-ID-HERE"

# 2. Case/Skin Database
[[d1_databases]]
binding = "CASES_DB"
database_name = "your-cases-db-name" # Change to your actual DB name
database_id = "PASTE-YOUR-CASES-DB-ID-HERE"

# 3. Static Assets (Fixes the 404 for your HTML files)
[assets]
directory = "./public" # Change this if your HTML files are in a different folder
binding = "ASSETS"
