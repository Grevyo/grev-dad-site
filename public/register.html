<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Grev.dad</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f5f7fa;
    }

    .wrap {
      max-width: 500px;
      margin: 60px auto;
      padding: 24px;
    }

    .logo {
      display: block;
      margin: 0 auto 30px;
      max-width: 260px;
      width: 100%;
      height: auto;
    }

    .box {
      background: #161b22;
      border: 1px solid #222831;
      border-radius: 18px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
    }

    label {
      display: block;
      margin: 16px 0 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0f1115;
      color: #fff;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      background: #2b6cb0;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-sizing: border-box;
    }

    button:hover {
      background: #245a92;
    }

    a {
      color: #9ecbff;
    }

    #message {
      color: #ffb4b4;
      margin-top: 16px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="index.html">
      <img src="grev-dad-logo.png" alt="Grev.dad logo" class="logo">
    </a>

    <div class="box">
      <h1>Create Account</h1>

      <form action="/api/register" method="POST">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <label for="password2">Repeat Password</label>
        <input id="password2" name="password2" type="password" required>

        <button type="submit">Create Account</button>
      </form>

      <p id="message"></p>
      <p>Already have an account? <a href="login.html">Log in here</a>.</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");
    if (msg) {
      document.getElementById("message").textContent = msg;
    }
  </script>
</body>
</html>
