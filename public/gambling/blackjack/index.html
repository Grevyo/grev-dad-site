<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Blackjack | Grev.dad</title><link rel="stylesheet" href="/styles/site.css" /><script src="/scripts/header.js" defer></script><script src="/scripts/gambling-wallet.js" defer></script></head><body><div class="page-shell"><div id="header-mount"></div><main class="page-main"><section class="panel"><p class="gambling-breadcrumb"><a href="/gambling/index.html">← Gambling hub</a></p><h1 class="panel-title">Live Blackjack</h1><p class="panel-subtitle">Create a room, join up to 5 seats, play against the house, and optionally add bots.</p><div id="gambling-wallet-mount"></div></section><section class="panel"><div class="form-grid"><input id="room-name" class="form-input" placeholder="Room name" /><input id="room-bet" class="form-input" type="number" min="1" step="0.01" value="1.00" /><select id="room-bots" class="form-input"><option value="0">0 bots</option><option value="1">1 bot</option><option value="2">2 bots</option><option value="3">3 bots</option><option value="4">4 bots</option></select><select id="room-bot-difficulty" class="form-input"><option value="easy">Easy bot</option><option value="medium">Medium bot</option><option value="hard">Hard bot</option></select><button id="create-room" class="btn btn-primary" type="button">Create room</button></div></section><section class="panel"><h2 class="panel-title">Rooms</h2><div id="room-list"></div></section><section class="panel"><h2 class="panel-title">Table</h2><div id="room-view" class="muted">Join a room to view it.</div><div class="inv-actions mt-16"><button id="start-room" class="btn btn-primary" type="button">Start round</button><button id="hit-btn" class="btn" type="button">Hit</button><button id="stand-btn" class="btn" type="button">Stand</button></div></section></main></div><script>
let currentRoomId=0; const $=(id)=>document.getElementById(id); const fmt=(p)=>`${(Number(p||0)/100).toFixed(2)} GC`;
async function api(url, options){ const r=await fetch(url,{credentials:'same-origin',...options}); const d=await r.json().catch(()=>null); if(!r.ok||!d?.success) throw new Error(d?.error||'Request failed'); return d; }
function score(cards){ let total=0, aces=0; (cards||[]).forEach(c=>{ if(c.rank==='A'){total+=11;aces+=1;} else if(['J','Q','K'].includes(c.rank)) total+=10; else total+=Number(c.rank); }); while(total>21&&aces>0){ total-=10; aces-=1;} return total; }
function renderRoom(room){ if(!room){ $('room-view').textContent='Join a room to view it.'; return; } const s=room.room_state||{}; $('room-view').innerHTML=`<div class="muted">Status: ${room.status} · Bet: ${fmt(room.bet_pence)}</div><div class="mt-12"><strong>Dealer</strong><div>${(s.dealer?.cards||[]).map(c=>`${c.rank}${c.suit}`).join(' ')} (${score(s.dealer?.cards)})</div></div><div class="mt-16">${(s.players||[]).map(p=>`<div class="panel" style="padding:12px;margin-bottom:10px"><strong>${p.username}${p.is_bot?` (${p.difficulty})`:''}</strong><div>${(p.cards||[]).map(c=>`${c.rank}${c.suit}`).join(' ')} (${score(p.cards)})</div><div class="muted">${p.result?`${p.result} · payout ${fmt(p.payout_pence)}`:(p.busted?'Busted':p.standing?'Standing':'Playing')}</div></div>`).join('')}</div>`; }
async function loadRooms(){ const data=await api('/api/blackjack/rooms'); $('room-list').innerHTML=(data.rooms||[]).map(r=>`<div class="inv-row"><div><strong>${r.room_name}</strong><div class="muted">${r.player_count}/${r.max_players} · ${r.status} · ${fmt(r.bet_pence)}</div></div><div class="inv-actions"><button class="btn" data-join="${r.id}">Join</button><button class="btn" data-open="${r.id}">Open</button></div></div>`).join('')||'<div class="muted">No rooms yet.</div>'; document.querySelectorAll('[data-join]').forEach(b=>b.onclick=async()=>{ await api('/api/blackjack/rooms/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:Number(b.dataset.join)})}); currentRoomId=Number(b.dataset.join); await loadCurrentRoom(); await loadRooms();}); document.querySelectorAll('[data-open]').forEach(b=>b.onclick=async()=>{ currentRoomId=Number(b.dataset.open); await loadCurrentRoom();}); }
async function loadCurrentRoom(){ if(!currentRoomId) return renderRoom(null); const data=await api(`/api/blackjack/room?room_id=${currentRoomId}`); renderRoom(data.room); }
$('create-room').onclick=async()=>{ const data=await api('/api/blackjack/rooms/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_name:$('room-name').value.trim(),bet_pence:Math.round(Number($('room-bet').value||1)*100),bot_count:Number($('room-bots').value),bot_difficulty:$('room-bot-difficulty').value})}); currentRoomId=data.room_id; await loadRooms(); await loadCurrentRoom();};
$('start-room').onclick=async()=>{ if(!currentRoomId) return; await api('/api/blackjack/rooms/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:currentRoomId})}); await loadCurrentRoom(); if(window.refreshGamblingWallet) window.refreshGamblingWallet(); };
$('hit-btn').onclick=async()=>{ if(!currentRoomId) return; await api('/api/blackjack/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:currentRoomId,action:'hit'})}); await loadCurrentRoom(); if(window.refreshGamblingWallet) window.refreshGamblingWallet(); };
$('stand-btn').onclick=async()=>{ if(!currentRoomId) return; await api('/api/blackjack/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:currentRoomId,action:'stand'})}); await loadCurrentRoom(); if(window.refreshGamblingWallet) window.refreshGamblingWallet(); };
window.addEventListener('DOMContentLoaded', async()=>{ await loadRooms(); });
</script></body></html>
