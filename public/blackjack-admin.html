<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Blackjack admin | Grev.dad</title><link rel="stylesheet" href="/styles/site.css" /><script src="/scripts/header.js" defer></script></head><body><div class="page-shell"><div id="header-mount"></div><main class="page-main"><section class="panel"><p class="gambling-breadcrumb"><a href="/gambling/index.html">← Back to the gambling hub</a></p><h1 class="auth-title">Blackjack admin</h1><p class="auth-subtitle">Manage blackjack event boosts and monitor who is seated or spectating at live blackjack tables from this game-specific admin page.</p><div class="admin-nav" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;"><a class="btn" href="/gambling-admin.html">Main hub</a><a class="btn" href="/cs2-admin.html">CS2 admin</a><a class="btn btn-primary" href="/blackjack-admin.html">Blackjack admin</a><a class="btn" href="/ygo-admin.html">Yu-Gi-Oh admin</a></div><div id="page-message" class="hidden mt-16"></div></section><section class="panel mt-24"><h2 class="panel-title">Blackjack event boost</h2><div class="form-grid"><input id="event-title" class="form-input" placeholder="Event title" /><input id="event-message" class="form-input" placeholder="Event message" /><input id="event-blackjack-bonus" class="form-input" type="number" min="0" max="500" step="1" value="0" /><label class="muted"><input id="event-active" type="checkbox" /> Event active</label><button id="save-blackjack-event" class="btn btn-primary" type="button">Save blackjack event</button></div></section><section class="panel mt-24"><h2 class="panel-title">Live room monitor</h2><div class="inv-actions" style="margin-bottom:12px"><button id="refresh-rooms" class="btn" type="button">Refresh rooms</button></div><div id="room-list"></div></section></main></div><script>let currentEvent = {};const pageMessage=document.getElementById('page-message');const roomList=document.getElementById('room-list');function showMessage(type,text){pageMessage.className=`alert alert-${type}`;pageMessage.textContent=text;}function escapeHtml(v){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');}function gc(v){return `${(Number(v||0)/100).toFixed(2)} GC`;}async function request(url,options){const r=await fetch(url,{credentials:'same-origin',...options});const d=await r.json().catch(()=>null);if(!r.ok||!d?.success) throw new Error(d?.error||'Request failed');return d;}async function loadRooms(){const data=await request('/api/blackjack/rooms');roomList.innerHTML=(data.rooms||[]).map((room)=>`<div class="panel" style="padding:12px;margin-bottom:12px"><strong>${escapeHtml(room.room_name)}</strong><div class="muted">${escapeHtml(room.status)} · ${gc(room.bet_pence)} · ${room.player_count}/${room.max_players} seated</div><div class="muted">Players: ${(room.players||[]).map((player)=>escapeHtml(player.username)).join(', ')||'None'}</div><div class="muted">Spectators: ${(room.spectators||[]).map((spectator)=>escapeHtml(spectator.username)).join(', ')||'None'}</div></div>`).join('')||'<div class="muted">No rooms found.</div>';}async function loadEvent(){const data=await request('/api/gambling/event');const event=data.event||{}; currentEvent=event;document.getElementById('event-title').value=event.title||'';document.getElementById('event-message').value=event.message||'';document.getElementById('event-blackjack-bonus').value=Number(event.blackjack_bonus_percent||0);document.getElementById('event-active').checked=Boolean(event.is_active);}document.getElementById('save-blackjack-event').onclick=async()=>{try{await request('/api/gambling/admin/event',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:document.getElementById('event-title').value,message:document.getElementById('event-message').value,is_active:document.getElementById('event-active').checked,cs2_discount_percent:Number(currentEvent.cs2_discount_percent||0),ygo_discount_percent:Number(currentEvent.ygo_discount_percent||0),blackjack_bonus_percent:Number(document.getElementById('event-blackjack-bonus').value||0)})});showMessage('success','Blackjack event settings saved.');}catch(error){showMessage('error',error.message);}};document.getElementById('refresh-rooms').onclick=()=>loadRooms();document.addEventListener('DOMContentLoaded',async()=>{try{await Promise.all([loadEvent(),loadRooms()]);}catch(error){showMessage('error',error.message);}});</script></body></html>
