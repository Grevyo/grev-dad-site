<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Grev.dad</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f5f7fa;
    }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(17, 21, 27, 0.96);
    border-bottom: 1px solid #222831;
  }

  .logo-link {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
  }

  .logo-img {
    height: 95px;
    width: auto;
    display: block;
  }

  .nav {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .nav a {
    color: #f5f7fa;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 600;
    opacity: 0.92;
  }

  .nav a:hover {
    opacity: 1;
    text-decoration: underline;
  }

    .wrap {
      max-width: 500px;
      margin: 40px auto;
      padding: 24px;
    }

    .logo {
      display: block;
      margin: 0 auto 30px;
      max-width: 260px;
      width: 100%;
      height: auto;
    }

    .box {
      background: #161b22;
      border: 1px solid #222831;
      border-radius: 18px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
    }

    label {
      display: block;
      margin: 16px 0 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0f1115;
      color: #fff;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      background: #2b6cb0;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-sizing: border-box;
    }

    button:hover {
      background: #245a92;
    }

    a {
      color: #9ecbff;
    }

    #message {
      color: #ffb4b4;
      margin-top: 16px;
      min-height: 1.2em;
    }


    @media (max-width: 700px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .logo-img {
        height: 72px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="logo-link">
      <img src="grev-dad-logo.png" alt="Grev.dad logo" class="logo-img">
    </a>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="login.html">Log In</a>
      <a href="register.html">Create Account</a>
    </nav>
  </header>
  <div class="wrap">
    <a href="index.html">
      <img src="grev-dad-logo.png" alt="Grev.dad logo" class="logo">
    </a>

    <div class="box">
      <h1>Create Account</h1>

      <form action="/api/register" method="POST">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <label for="password2">Repeat Password</label>
        <input id="password2" name="password2" type="password" required>

        <button type="submit">Create Account</button>
      </form>

      <p id="message"></p>
      <p>Already have an account? <a href="login.html">Log in here</a>.</p>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const msg = params.get("msg");
  const el = document.getElementById("message");
  if (msg && el) el.textContent = msg;
</script>
</body>
</html>
