<style>
  .topbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(17, 21, 27, 0.96);
    border-bottom: 1px solid #222831;
  }

  .logo-link {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
  }

  .logo-img {
    height: 95px;
    width: auto;
    display: block;
  }

  .nav {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .nav a {
    color: #f5f7fa;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 600;
    opacity: 0.92;
  }

  .nav a:hover {
    opacity: 1;
    text-decoration: underline;
  }

  .hidden {
    display: none !important;
  }

  @media (max-width: 700px) {
    .topbar {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .logo-img {
      height: 72px;
    }
  }
</style>

<header class="topbar">
  <a href="/index.html" class="logo-link">
    <img src="/grev-dad-logo.png" alt="Grev.dad logo" class="logo-img">
  </a>

  <nav class="nav">
    <a href="/index.html">Home</a>
    <a href="/forum.html">Forum</a>

    <a href="/login.html" id="navLogin">Log In</a>
    <a href="/register.html" id="navRegister">Create Account</a>

    <a href="/members.html" id="navMembers" class="hidden">Members</a>
    <a href="/profile.html" id="navProfile" class="hidden">Profile</a>
    <a href="/admin.html" id="navAdmin" class="hidden">Admin</a>
    <a href="/api/logout" id="navLogout" class="hidden">Log Out</a>
  </nav>
</header>
