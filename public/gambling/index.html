<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casino | Grev.dad</title>
  <link rel="stylesheet" href="/styles/site.css" />
  <script src="/scripts/header.js" defer></script>
  <style>
    .casino-shell,
    .hero-actions,
    .game-grid {
      display: grid;
      gap: 20px;
    }
    .casino-hero {
      padding: 32px 28px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background:
        radial-gradient(circle at top left, rgba(248, 196, 68, 0.2), transparent 28%),
        radial-gradient(circle at bottom right, rgba(104, 193, 255, 0.14), transparent 26%),
        linear-gradient(135deg, color-mix(in srgb, #1f7a4c 22%, var(--bg-elevated)), color-mix(in srgb, var(--bg-soft) 80%, transparent));
    }
    .eyebrow { display: inline-flex; align-items: center; gap: 8px; min-height: 32px; padding: 0 12px; border-radius: 999px; font-size: 0.84rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; background: rgba(248, 196, 68, 0.14); border: 1px solid rgba(248, 196, 68, 0.24); margin-bottom: 16px; }
    .casino-hero h1 { margin: 0 0 12px; font-size: clamp(2rem, 4vw, 3rem); }
    .casino-hero p { color: var(--muted); line-height: 1.7; }
    .hero-actions { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-top: 24px; }
    .game-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 280px)); }
    .stat-card {
      padding: 18px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      border: 1px solid var(--border);
    }
    .game-button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 64px;
      padding: 0 24px;
      border-radius: var(--radius-md);
      font-size: 1.05rem;
      font-weight: 800;
      text-align: center;
    }
    .stat-label { margin: 0 0 8px; color: var(--muted); font-size: 0.9rem; }
    .stat-value { margin: 0; font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 800; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div id="header-mount"></div>
    <main class="page-main casino-shell">
      <section class="panel casino-hero">
        <span class="eyebrow">🎰 Casino</span>
        <h1>Welcome to Grev.dad Casino</h1>
        <p>Pick a game and spin something shiny.</p>
        <div class="hero-actions">
          <div class="stat-card">
            <p class="stat-label">Your balance</p>
            <p id="player-balance" class="stat-value">Sign in to view</p>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="game-grid">
          <a class="btn btn-primary game-button" href="/gambling/daily-spin.html">Daily Spin</a>
          <a class="btn btn-primary game-button" href="/gambling/classic-spins.html">Classic Fruity</a>
        </div>
      </section>
    </main>
  </div>

  <script>
    const balanceEl = document.getElementById("player-balance");

    function formatGc(value) {
      const amount = Number(value || 0);
      return `${amount.toLocaleString("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} GC`;
    }

    async function loadCasinoProfile() {
      const user = await window.fetchCurrentUser({ preferCache: true });
      if (!user) {
        balanceEl.textContent = "Sign in to view";
        if (typeof window.writeCasinoBalance === "function") window.writeCasinoBalance(null);
        return;
      }

      try {
        const response = await fetch("/api/casino/profile", { credentials: "same-origin" });
        const data = await response.json();
        if (!response.ok || !data?.success) throw new Error(data?.error || "Failed to load casino profile");

        const formatted = formatGc(data?.profile?.grev_coin_balance || 0);
        balanceEl.textContent = formatted;
        if (typeof window.writeCasinoBalance === "function") {
          window.writeCasinoBalance({
            formatted,
            value: Number(data?.profile?.grev_coin_balance || 0),
            updated_at: Date.now()
          });
        }
      } catch (error) {
        console.error(error);
        balanceEl.textContent = "Could not load";
      }
    }

    document.addEventListener("DOMContentLoaded", loadCasinoProfile);
  </script>
</body>
</html>
