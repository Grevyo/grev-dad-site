<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Grev.dad</title>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0f1115; color: #f5f7fa; }
    .topbar { position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: rgba(17, 21, 27, 0.96); border-bottom: 1px solid #222831; }
    .logo-link { display: inline-flex; align-items: center; text-decoration: none; }
    .logo-img { height: 95px; width: auto; display: block; }
    .nav { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
    .nav a { color: #f5f7fa; text-decoration: none; font-size: 0.95rem; font-weight: 600; opacity: 0.92; }
    .nav a:hover { opacity: 1; text-decoration: underline; }
    .wrap { max-width: 1100px; margin: 40px auto; padding: 24px; }
    .box { background: #161b22; border: 1px solid #222831; border-radius: 18px; padding: 24px; margin-bottom: 24px; }
    .form-input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #222831; border-radius: 8px; color: #f5f7fa; background: #0f141a; }
    .form-input:focus { outline: none; border-color: #9ecbff; }
    .form-button { width: 100%; padding: 12px; background: #9ecbff; border: none; border-radius: 8px; color: #0f1115; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .form-button:hover { background: #4a8ab7; }
    .footer { max-width: 1100px; margin: 0 auto; padding: 10px 24px 50px; color: #8f98a3; font-size: 0.92rem; }
  </style>
</head>
<body>
  <!-- The header will be injected here -->
  <div id="site-header"></div>

  <main>
    <div class="wrap">
      <div class="box">
        <h1>Create Account</h1>
        <form action="/api/register" method="POST">
          <input class="form-input" type="text" name="username" placeholder="Username" required />
          <input class="form-input" type="password" name="password" placeholder="Password" required />
          <input class="form-input" type="password" name="password2" placeholder="Repeat Password" required />
          <button class="form-button" type="submit">Create Account</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer">© Grev.dad — personal projects, playgrounds, and experiments.</footer>

  <script src="/header.js"></script>
</body>
</html>
