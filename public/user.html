<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Inventory - Grev.dad</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0f1115; color: #f5f7fa; }
    
    .wrap { max-width: 1000px; margin: 40px auto; padding: 24px; }
    .box { background: #161b22; border: 1px solid #222831; border-radius: 18px; padding: 30px; margin-bottom: 24px; position: relative; }
    
    /* Header Styles */
    .user-header { display: flex; align-items: center; gap: 15px; }
    .status-indicator { width: 12px; height: 12px; border-radius: 50%; background: #6b7280; }
    .online { background: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }
    .away { background: #facc15; box-shadow: 0 0 10px rgba(250, 204, 21, 0.4); }

    .inventory-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
      gap: 16px; 
      margin-top: 20px; 
    }

    .item-card { 
      background: #0d1117; 
      border: 1px solid #222831; 
      border-radius: 12px; 
      padding: 15px; 
      text-align: center;
      transition: transform 0.2s;
      border-bottom: 4px solid #4b69ff;
    }
    .item-card:hover { transform: translateY(-5px); border-color: #9ecbff; }

    /* Rarity Colors - Matching CS2 Standards */
    .rarity-Covert { border-bottom-color: #eb4b4b; }
    .rarity-Classified { border-bottom-color: #d32ee6; }
    .rarity-Restricted { border-bottom-color: #8847ff; }
    .rarity-Mil-Spec { border-bottom-color: #4b69ff; }
    .rarity-Industrial { border-bottom-color: #5e98d9; }
    .rarity-Consumer { border-bottom-color: #b0c3d9; }

    .item-val { color: #9ecbff; font-weight: bold; margin-top: 8px; display: block; font-size: 1.1rem; }
    .item-name { font-size: 0.85rem; display: block; margin-bottom: 5px; color: #8f98a3; }
    .item-type { font-weight: bold; font-size: 0.95rem; }
    
    .back-link { color: #8f98a3; text-decoration: none; font-size: 0.9rem; margin-bottom: 15px; display: inline-block; }
    .back-link:hover { color: #9ecbff; }

    .total-badge {
      position: absolute;
      top: 30px;
      right: 30px;
      background: #222831;
      padding: 8px 15px;
      border-radius: 10px;
      border: 1px solid #333b45;
      font-weight: bold;
      color: #9ecbff;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="wrap">
    <a href="/members.html" class="back-link">← Back to Leaderboard</a>
    
    <div class="box">
      <div class="user-header">
        <div id="status-dot" class="status-indicator"></div>
        <h1 id="user-title" style="margin:0;">Loading...</h1>
      </div>
      <p id="stats-summary" style="color: #8f98a3; margin-top: 10px;">Fetching inventory details...</p>
      <div id="total-val-display" class="total-badge">$0.00</div>
    </div>

    <div class="box">
      <h2 style="font-size: 1.2rem; border-bottom: 1px solid #222831; padding-bottom: 10px;">Collection Showcase</h2>
      <div id="inventory-list" class="inventory-grid"></div>
    </div>
  </div>

  <script src="/header.js"></script>
  <script>
    async function loadUserInventory() {
      const params = new URLSearchParams(window.location.search);
      const userId = params.get("id");

      if (!userId) {
        document.getElementById("user-title").innerText = "User not found.";
        return;
      }

      try {
        const res = await fetch(`/api/user/inventory?id=${userId}`);
        if (!res.ok) throw new Error("Private or Missing");

        const data = await res.json();
        const user = data.user;
        const inventory = data.inventory;
        
        // Update Page Titles & Status using correct data mapping
        document.title = `${user.username}'s Inventory - Grev.dad`;
        document.getElementById("user-title").innerText = `${user.username}'s Showcase`;
        
        const statusDot = document.getElementById("status-dot");
        statusDot.className = "status-indicator"; // Reset
        if (user.status === 'online') statusDot.classList.add('online');
        if (user.status === 'away') statusDot.classList.add('away');

        const list = document.getElementById("inventory-list");
        list.innerHTML = "";

        let totalVal = 0;
        
        if (inventory.length === 0) {
          list.innerHTML = "<p style='color: #4b4e52; grid-column: 1/-1; text-align: center; padding: 40px;'>This user hasn't unboxed any skins yet.</p>";
        }

        inventory.forEach(item => {
          totalVal += item.estimated_value;
          
          // Split the name (e.g. "AK-47 | Inheritance (Factory New)")
          // We split by " | " then handle the skin name and wear
          const parts = item.skin_name.split(" | ");
          const weapon = parts[0] || "Item";
          const skin = parts[1] || "Default";

          const div = document.createElement("div");
          // Re-map rarity name to handle spaces (Mil-Spec -> Mil-Spec)
          const rarityClass = item.skin_rarity.replace(" ", "-");
          div.className = `item-card rarity-${rarityClass}`;
          
          div.innerHTML = `
            <span class="item-name">${weapon}</span>
            <span class="item-type">${skin}</span>
            <span class="item-val">$${item.estimated_value.toFixed(2)}</span>
          `;
          list.appendChild(div);
        });

        document.getElementById("stats-summary").innerText = `Collection Size: ${inventory.length} items`;
        document.getElementById("total-val-display").innerText = `$${totalVal.toFixed(2)}`;

      } catch (err) {
        console.error(err);
        document.getElementById("user-title").innerText = "Profile Unavailable";
        document.getElementById("stats-summary").innerText = "Could not load this user's inventory.";
      }
    }

    loadUserInventory();
  </script>
</body>
</html>
