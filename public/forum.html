<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum | Grev.dad</title>
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <script src="/assets/js/main.js" defer></script>
  <style>
    .forum-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .forum-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      margin-top: 18px;
    }

    .forum-list {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .forum-post-card {
      display: block;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.02);
      padding: 18px;
      color: var(--text);
      text-decoration: none;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .forum-post-card:hover {
      transform: translateY(-1px);
      border-color: #3a4a61;
      background: rgba(255, 255, 255, 0.04);
    }

    .forum-post-image {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 14px;
      background: rgba(255,255,255,0.03);
    }

    .forum-post-title {
      margin: 0 0 10px;
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .forum-post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .forum-post-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.88rem;
    }

    .forum-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    .forum-empty {
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 22px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .forum-controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div id="header-mount"></div>

    <main class="page-main">
      <section class="panel">
        <div class="forum-head">
          <div>
            <h1 class="auth-title">Forum</h1>
            <p class="auth-subtitle">
              Search posts, open threads, react, and join the discussion.
            </p>
          </div>

          <a class="btn btn-primary" href="/new-post.html">New post</a>
        </div>

        <div class="forum-controls">
          <input
            id="forum-search"
            class="form-input"
            type="text"
            placeholder="Search posts by title, body, or author..."
          />
          <button id="forum-refresh" class="btn" type="button">Refresh</button>
        </div>

        <div id="forum-message" class="hidden mt-16"></div>
        <div id="forum-list" class="forum-list"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">Grev.dad — forum</div>
    </footer>
  </div>

  <script>
    const forumSearch = document.getElementById("forum-search");
    const forumRefresh = document.getElementById("forum-refresh");
    const forumMessage = document.getElementById("forum-message");
    const forumList = document.getElementById("forum-list");

    function showMessage(type, text) {
      forumMessage.className = `alert alert-${type} mt-16`;
      forumMessage.textContent = text;
    }

    function clearMessage() {
      forumMessage.className = "hidden mt-16";
      forumMessage.textContent = "";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatDate(value) {
      if (!value) return "—";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "—";
      return date.toLocaleString("en-GB", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderPosts(posts) {
      if (!Array.isArray(posts) || posts.length === 0) {
        forumList.innerHTML = `<div class="forum-empty">No forum posts found.</div>`;
        return;
      }

      forumList.innerHTML = posts.map((post) => `
        <a class="forum-post-card" href="/post.html?id=${post.id}">
          ${post.image_url ? `<img class="forum-post-image" src="${escapeHtml(post.image_url)}" alt="Thread image" loading="lazy" />` : ""}
          <h2 class="forum-post-title">${escapeHtml(post.title || "Untitled post")}</h2>
          <div class="forum-post-meta">
            <span>By ${escapeHtml(post.author_username || "Unknown")}</span>
            <span>${escapeHtml(post.author_group || "Member")}</span>
            <span>${escapeHtml(formatDate(post.created_at))}</span>
          </div>
          <div class="forum-post-stats">
            <span class="forum-pill">👍 ${Number(post.like_count || 0)}</span>
            <span class="forum-pill">👎 ${Number(post.dislike_count || 0)}</span>
            <span class="forum-pill">💬 ${Number(post.comment_count || 0)}</span>
          </div>
        </a>
      `).join("");
    }

    async function loadPosts() {
      clearMessage();

      const search = forumSearch.value.trim();

      try {
        const response = await fetch(`/api/forum/posts?search=${encodeURIComponent(search)}`, {
          method: "GET",
          credentials: "same-origin"
        });

        const data = await response.json().catch(() => null);

        if (!response.ok || !data?.success) {
          showMessage("error", data?.error || "Failed to load forum posts.");
          renderPosts([]);
          return;
        }

        renderPosts(data.posts || []);
      } catch (error) {
        console.error(error);
        showMessage("error", "Could not load forum posts.");
        renderPosts([]);
      }
    }

    forumRefresh.addEventListener("click", loadPosts);
    forumSearch.addEventListener("input", loadPosts);
    document.addEventListener("DOMContentLoaded", loadPosts);
  </script>
</body>
</html>
