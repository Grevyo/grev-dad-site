<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Inventory - Grev.dad</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0f1115; color: #f5f7fa; }
    .wrap { max-width: 1000px; margin: 40px auto; padding: 24px; }
    .box { background: #161b22; border: 1px solid #222831; border-radius: 18px; padding: 30px; margin-bottom: 24px; }
    
    .inventory-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
      gap: 16px; 
      margin-top: 20px; 
    }
    .item-card { 
      background: #0d1117; 
      border: 1px solid #222831; 
      border-radius: 12px; 
      padding: 15px; 
      text-align: center;
      border-bottom: 4px solid #4b69ff;
    }
    .rarity-covert { border-bottom-color: #eb4b4b; }
    .rarity-classified { border-bottom-color: #d32ee6; }
    .rarity-restricted { border-bottom-color: #8847ff; }
    .rarity-milspec { border-bottom-color: #4b69ff; }

    .item-val { color: #9ecbff; font-weight: bold; margin-top: 8px; display: block; }
    .item-name { font-size: 0.9rem; display: block; margin-bottom: 5px; }
    
    .back-link { color: #8f98a3; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #f5f7fa; text-decoration: underline; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="wrap">
    <a href="/members.html" class="back-link">← Back to Leaderboard</a>
    
    <div class="box">
      <h1 id="user-title">Loading...</h1>
      <p id="stats-summary">Fetching inventory details...</p>
    </div>

    <div class="box">
      <h2>Inventory</h2>
      <div id="inventory-list" class="inventory-grid"></div>
    </div>
  </div>

  <script src="/header.js"></script>
  <script>
    async function loadUserInventory() {
      // Get the ID from the URL (e.g., user.html?id=5)
      const params = new URLSearchParams(window.location.search);
      const userId = params.get("id");

      if (!userId) {
        document.getElementById("user-title").innerText = "User not found.";
        return;
      }

      const res = await fetch(`/api/user/inventory?id=${userId}`);
      if (!res.ok) {
        document.getElementById("user-title").innerText = "Private or Missing Inventory";
        return;
      }

      const data = await res.json();
      document.title = `${data.username}'s Inventory - Grev.dad`;
      document.getElementById("user-title").innerText = `${data.username}'s Showcase`;
      
      const list = document.getElementById("inventory-list");
      list.innerHTML = "";

      let totalVal = 0;
      data.items.forEach(item => {
        totalVal += item.estimated_value;
        const div = document.createElement("div");
        div.className = `item-card rarity-${item.skin_rarity}`;
        div.innerHTML = `
          <span class="item-name">${item.skin_name}</span>
          <span class="item-val">$${item.estimated_value.toFixed(2)}</span>
        `;
        list.appendChild(div);
      });

      document.getElementById("stats-summary").innerText = 
        `Total Collection Value: $${totalVal.toFixed(2)} | Items Owned: ${data.items.length}`;
    }

    loadUserInventory();
  </script>
</body>
</html>
