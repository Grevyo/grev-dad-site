<script>
    async function loadProfile() {
      // 1. Get ID from URL (e.g., profile.html?id=4)
      const params = new URLSearchParams(window.location.search);
      let userId = params.get("id");

      // 2. If NO ID is in the URL, fetch the logged-in user's data
      if (!userId) {
        const meRes = await fetch("/api/me");
        if (meRes.ok) {
          const meData = await meRes.json();
          userId = meData.user.id;
          // Update URL without refreshing so the ID is visible
          window.history.replaceState({}, '', `${window.location.pathname}?id=${userId}`);
        } else {
          window.location.href = "/login.html?msg=Please%20log%20in.";
          return;
        }
      }

      const grid = document.getElementById("inventory-grid");
      const worthDisplay = document.getElementById("total-worth");

      try {
        // 3. Fetch from /api/profile (Matching our Worker route)
        const res = await fetch(`/api/profile?id=${userId}`);
        if (!res.ok) throw new Error("Profile not found");

        const data = await res.json();
        
        // 4. Update Header Details
        document.getElementById("username").textContent = data.username;
        document.title = `${data.username}'s Profile - Grev.dad`;
        
        const statusEl = document.getElementById("user-status");
        statusEl.textContent = data.status.toUpperCase();
        statusEl.className = `status-badge ${data.status}`;

        // 5. Update Inventory Grid
        if (!data.inventory || data.inventory.length === 0) {
          grid.innerHTML = "<p style='grid-column: 1/-1;'>This user's inventory is empty.</p>";
          worthDisplay.textContent = "$0.00";
          return;
        }

        grid.innerHTML = ""; 
        let total = 0;

        data.inventory.forEach(item => {
          // Note: Using 'price' and 'rarity' to match our index.js logic
          const itemPrice = Number(item.price) || 0;
          total += itemPrice;

          const card = document.createElement("div");
          // Clean up rarity string for CSS (e.g., "Mil-Spec" -> "Mil-Spec")
          const rarityClass = (item.rarity || "Consumer").replace(/\s+/g, '-');
          card.className = `skin-card rarity-${rarityClass}`;
          
          card.innerHTML = `
            <div class="skin-name">${item.skin_name}</div>
            <div class="skin-value">$${itemPrice.toFixed(2)}</div>
            <div style="font-size: 0.65rem; color: #8f98a3; margin-top: 5px;">${item.wear || ''}</div>
          `;
          grid.appendChild(card);
        });

        worthDisplay.textContent = `$${total.toFixed(2)}`;

      } catch (err) {
        console.error("Error loading profile:", err);
        grid.innerHTML = "<p>Could not load this profile. It may not exist.</p>";
      }
    }

    loadProfile();
  </script>
