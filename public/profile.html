<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Grev.dad</title>
  <style>
  .hidden {
  display: none !important;
}
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0f1115; color: #f5f7fa; }
    .topbar { position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: rgba(17, 21, 27, 0.96); border-bottom: 1px solid #222831; }
    .logo-link { display: inline-flex; align-items: center; text-decoration: none; }
    .logo-img { height: 95px; width: auto; display: block; }
    .nav { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
    .nav a { color: #f5f7fa; text-decoration: none; font-size: 0.95rem; font-weight: 600; opacity: 0.92; }
    .nav a:hover { opacity: 1; text-decoration: underline; }
    .wrap { max-width: 1100px; margin: 40px auto; padding: 24px; }
    .box { background: #161b22; border: 1px solid #222831; border-radius: 18px; padding: 24px; margin-bottom: 24px; }
    .footer { max-width: 1100px; margin: 0 auto; padding: 10px 24px 50px; color: #8f98a3; font-size: 0.92rem; }
  </style>
</head>
<body>
  <!-- The header will be injected here -->
  <div id="site-header"></div>

  <main>
    <div class="wrap">
      <div class="box">
        <h1>Your Profile</h1>
        <p>Welcome, <strong id="username">Loading...</strong></p>
      </div>
    </div>
  </main>

  <footer class="footer">© Grev.dad — personal projects, playgrounds, and experiments.</footer>

  <script src="/header.js"></script>
  <script>
    async function loadProfile() {
      const res = await fetch("/api/me", { credentials: "include" });
      if (!res.ok) {
        window.location.href = "/login.html?msg=Please%20log%20in.";
        return;
      }

      const data = await res.json();
      document.getElementById("username").textContent = data.user.username;
    }

    loadProfile();
  </script>
</body>
</html>
