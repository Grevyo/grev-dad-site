<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grev Pets Home</title>
  <link rel="stylesheet" href="/styles/site.css" />
  <link rel="stylesheet" href="/grev-pets/style.css" />
  <script src="/scripts/header.js" defer></script>
  <script type="module" src="/grev-pets/js/landing.js" defer></script>
</head>
<body class="gp-page">
  <div class="page-shell">
    <div id="header-mount"></div>
    <main class="page-main">
      <div class="gp-shell">
        <section class="gp-hero gp-home-hero">
          <div>
            <p class="gp-kicker">GREV PETS DASHBOARD</p>
            <h1>🐾 Grev Pets Home Base</h1>
            <p class="gp-hero-copy">Your team and active companion, front and center.</p>
            <div class="gp-actions">
              <a class="btn btn-primary" href="/grev-pets/overworld.html">Enter Overworld</a>
              <a class="btn" href="/grev-pets/stable.html">Open Storage / Stable</a>
              <a class="btn" href="/grev-pets/event-room.html">Open Event Plaza</a>
            </div>
          </div>
          <aside class="gp-card gp-profile-summary" id="profile-summary">
            <p>Loading profile…</p>
          </aside>
        </section>

        <section class="gp-home-hub-grid">
          <article class="gp-card gp-home-active-card" id="active-pet-panel"></article>
          <article class="gp-card gp-home-team-card" id="team-panel"></article>
          <aside class="gp-home-utility-stack">
            <article class="gp-card" id="storage-panel"></article>
            <article class="gp-card" id="progress-panel"></article>
            <article class="gp-card hidden" id="starter-claimed-card"></article>
          </aside>
        </section>

        <section class="gp-home-lower-grid">
          <article class="gp-card hidden" id="starter-flow-card">
            <div class="gp-section-head">
              <h2>Starter Adoption</h2>
              <p class="gp-small">Pick once if needed.</p>
            </div>
            <div class="gp-grid gp-grid-3" id="starter-options"></div>
          </article>
          <article class="gp-card" id="recent-panel"></article>
        </section>
        <p id="starter-status" class="gp-small"></p>

        <section class="gp-card">
          <div class="gp-section-head">
            <h2>Explorer Avatar</h2>
            <button class="btn" id="toggle-avatar-editor" type="button">Edit Explorer</button>
          </div>
          <div id="avatar-edit-shell" class="gp-avatar-edit-shell hidden">
            <div class="gp-avatar-preview-wrap">
              <div id="avatar-preview"></div>
              <div class="gp-actions">
                <button class="btn btn-primary" id="save-avatar" type="button">Save Explorer</button>
                <button class="btn" id="cancel-avatar" type="button">Cancel</button>
              </div>
            </div>
            <div id="avatar-editor-fields"></div>
          </div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
