<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grev.dad | Case Opening</title>
    <style>
        /* CORE STYLING */
        body {
            background-color: #1a1a1d;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER SPACE - Ensures content doesn't hide under the nav */
        #header-container { width: 100%; min-height: 60px; background: #111; }

        .container { width: 90%; max-width: 1000px; margin-top: 30px; text-align: center; }

        /* THE SPINNER WINDOW */
        .spinner-viewport {
            width: 100%;
            height: 160px;
            background: #111;
            border: 3px solid #333;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            margin: 20px 0;
        }

        /* The Selection Needle */
        .spinner-viewport::after {
            content: "";
            position: absolute;
            top: 0; left: 50%;
            width: 3px; height: 100%;
            background: #ff4b4b;
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 0 0 10px rgba(255, 75, 75, 0.8);
        }

        #rail {
            display: flex;
            height: 100%;
            align-items: center;
            transition: transform 5s cubic-bezier(0.1, 0, 0.05, 1);
        }

        /* SKIN CARDS */
        .skin-card {
            min-width: 150px;
            width: 150px;
            height: 120px;
            margin: 0 5px;
            background: #25252b;
            border-bottom: 4px solid #555;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px;
            border-radius: 4px;
            flex-shrink: 0;
            font-size: 13px;
        }

        /* RARITY BORDERS */
        .rarity-milspec { border-color: #4b69ff; }
        .rarity-restricted { border-color: #8847ff; }
        .rarity-classified { border-color: #d32ee6; }
        .rarity-covert { border-color: #eb4b4b; }
        .rarity-rare_special { border-color: #ffae00; }

        /* BUTTONS & SELECT */
        .controls { margin-top: 20px; }
        select, button {
            background: #333;
            color: white;
            padding: 12px 20px;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button { background: #ffae00; color: #000; font-weight: bold; border: none; margin-left: 10px; }
        button:disabled { background: #555; cursor: not-allowed; }

        /* GLOBAL FEED (SIDEBAR) */
        #global-feed {
            position: fixed;
            left: 20px;
            top: 100px;
            width: 220px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 4px;
            text-align: left;
            font-size: 12px;
        }
        .feed-item { margin-bottom: 8px; border-left: 3px solid #4b69ff; padding-left: 8px; }

        #win-message { color: #888; margin-top: 15px; }
        #win-details { font-weight: bold; color: #ffae00; font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <div id="global-feed">
        <h3 style="margin:0 0 10px 0; font-size: 14px; color: #ffae00;">LIVE DROPS</h3>
        <div id="feed-content">Loading feed...</div>
    </div>

    <div class="container">
        <h1>Case Opening</h1>

        <div class="spinner-viewport">
            <div id="rail">
                </div>
        </div>

        <div id="win-display">
            <div id="win-message">Ready to open?</div>
            <div id="win-details"></div>
        </div>

        <div class="controls">
            <select id="caseSelector" onchange="updateCasePreview()">
                <option>Loading...</option>
            </select>
            <button id="openBtn" onclick="startSpin()">Unbox ($2.50)</button>
        </div>
    </div>

    <script src="/header.js"></script>
    <script>
        let currentCaseSkins = [];
        const rail = document.getElementById('rail');
        const openBtn = document.getElementById('openBtn');

        async function initCases() {
            try {
                const res = await fetch("/api/cases/list");
                const data = await res.json();
                const selector = document.getElementById('caseSelector');
                
                if (!data.cases || data.cases.length === 0) {
                    selector.innerHTML = "<option>No Cases Found</option>";
                    return;
                }

                selector.innerHTML = "";
                data.cases.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.case_name;
                    opt.innerText = c.case_name;
                    selector.appendChild(opt);
                });
                updateCasePreview();
            } catch (err) {
                console.error("Init error:", err);
            }
        }

        async function updateCasePreview() {
            const caseName = document.getElementById('caseSelector').value;
            if(!caseName) return;

            const res = await fetch(`/api/cases/skins?name=${encodeURIComponent(caseName)}`);
            const data = await res.json();
            currentCaseSkins = data.skins;
            
            rail.innerHTML = "";
            currentCaseSkins.forEach(skin => {
                const card = document.createElement('div');
                card.className = `skin-card rarity-${skin.rarity}`;
                card.innerHTML = `<strong>${skin.weapon_type}</strong><br>${skin.skin_name}`;
                rail.appendChild(card);
            });
        }

        async function loadGlobalFeed() {
          try {
            const res = await fetch("/api/inventory/recent-global");
            const data = await res.json();
            const feed = document.getElementById("feed-content");
            if (!data.recent) return;

            feed.innerHTML = "";
            const colors = { covert: '#eb4b4b', classified: '#d32ee6', restricted: '#8847ff', milspec: '#4b69ff', rare_special: '#ffae00' };
            
            data.recent.forEach(drop => {
              const div = document.createElement("div");
              div.className = "feed-item";
              div.style.borderLeftColor = colors[drop.skin_rarity] || '#4b69ff';
              div.innerHTML = `<div style="color:#aaa">${drop.username}</div><div style="color:${colors[drop.skin_rarity]}">${drop.skin_name}</div>`;
              feed.appendChild(div);
            });
          } catch (e) {}
        }

        async function startSpin() {
          const caseName = document.getElementById('caseSelector').value;
          if (!caseName) return;

          openBtn.disabled = true;
          const response = await fetch("/api/cases/open", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ caseName: caseName })
          });
          const result = await response.json();
          
          if (!result.success) {
              alert(result.error || "Login required.");
              openBtn.disabled = false;
              return;
          }

          rail.style.transition = "none";
          rail.style.transform = "translateX(0px)";
          rail.innerHTML = "";
          
          const winningIndex = 40; 
          const itemWidth = 160; 

          for(let i=0; i < 60; i++) {
            const isWinner = (i === winningIndex);
            const skin = isWinner ? result : currentCaseSkins[Math.floor(Math.random() * currentCaseSkins.length)];
            const card = document.createElement('div');
            const rarity = isWinner ? result.rarity : skin.rarity;
            card.className = `skin-card rarity-${rarity}`;
            card.innerHTML = isWinner ? `<strong>${result.item}</strong>` : `<strong>${skin.weapon_type}</strong><br>${skin.skin_name}`;
            rail.appendChild(card);
          }

          const viewportWidth = document.querySelector('.spinner-viewport').offsetWidth;
          const finalOffset = (winningIndex * itemWidth) - (viewportWidth / 2) + (itemWidth / 2);

          setTimeout(() => {
            rail.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.05, 1)";
            rail.style.transform = `translateX(-${finalOffset}px)`;
          }, 50);

          setTimeout(() => {
            document.getElementById('win-message').innerText = "NEW DROP:";
            document.getElementById('win-details').innerText = result.item;
            openBtn.disabled = false;
            loadGlobalFeed();
          }, 5200);
        }

        initCases();
        loadGlobalFeed();
        setInterval(loadGlobalFeed, 10000); 
    </script>
</body>
</html>
