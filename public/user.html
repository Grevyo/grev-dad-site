<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Inventory - Grev.dad</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0f1115; color: #f5f7fa; }
    
    .wrap { max-width: 1000px; margin: 40px auto; padding: 24px; }
    .box { background: #161b22; border: 1px solid #222831; border-radius: 18px; padding: 30px; margin-bottom: 24px; position: relative; }
    
    /* Header Styles */
    .user-header { display: flex; align-items: center; gap: 15px; }
    .status-indicator { width: 12px; height: 12px; border-radius: 50%; background: #6b7280; }
    .online { background: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }

    .inventory-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
      gap: 16px; 
      margin-top: 20px; 
    }

    .item-card { 
      background: #0d1117; 
      border: 1px solid #222831; 
      border-radius: 12px; 
      padding: 15px; 
      text-align: center;
      transition: transform 0.2s;
      border-bottom: 4px solid #4b69ff;
    }
    .item-card:hover { transform: translateY(-5px); border-color: #9ecbff; }

    /* Rarity Colors */
    .rarity-covert { border-bottom-color: #eb4b4b; }
    .rarity-classified { border-bottom-color: #d32ee6; }
    .rarity-restricted { border-bottom-color: #8847ff; }
    .rarity-milspec { border-bottom-color: #4b69ff; }

    .item-val { color: #9ecbff; font-weight: bold; margin-top: 8px; display: block; font-size: 1.1rem; }
    .item-name { font-size: 0.85rem; display: block; margin-bottom: 5px; color: #8f98a3; }
    .item-type { font-weight: bold; font-size: 0.95rem; }
    
    .back-link { color: #8f98a3; text-decoration: none; font-size: 0.9rem; margin-bottom: 15px; display: inline-block; }
    .back-link:hover { color: #9ecbff; }

    .total-badge {
      position: absolute;
      top: 30px;
      right: 30px;
      background: #222831;
      padding: 8px 15px;
      border-radius: 10px;
      border: 1px solid #333b45;
      font-weight: bold;
      color: #9ecbff;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="wrap">
    <a href="/members.html" class="back-link">← Back to Leaderboard</a>
    
    <div class="box">
      <div class="user-header">
        <div id="status-dot" class="status-indicator"></div>
        <h1 id="user-title" style="margin:0;">Loading...</h1>
      </div>
      <p id="stats-summary" style="color: #8f98a3; margin-top: 10px;">Fetching inventory details...</p>
      <div id="total-val-display" class="total-badge">$0.00</div>
    </div>

    <div class="box">
      <h2 style="font-size: 1.2rem; border-bottom: 1px solid #222831; padding-bottom: 10px;">Collection Showcase</h2>
      <div id="inventory-list" class="inventory-grid"></div>
    </div>
  </div>

  <script src="/header.js"></script>
  <script>
    async function loadUserInventory() {
      const params = new URLSearchParams(window.location.search);
      const userId = params.get("id");

      if (!userId) {
        document.getElementById("user-title").innerText = "User not found.";
        return;
      }

      try {
        const res = await fetch(`/api/user/inventory?id=${userId}`);
        if (!res.ok) throw new Error("Private or Missing");

        const data = await res.json();
        
        // Update Page Titles & Status
        document.title = `${data.username}'s Inventory - Grev.dad`;
        document.getElementById("user-title").innerText = `${data.username}'s Showcase`;
        if (data.status === 'online') document.getElementById("status-dot").classList.add('online');

        const list = document.getElementById("inventory-list");
        list.innerHTML = "";

        let totalVal = 0;
        
        if (data.items.length === 0) {
          list.innerHTML = "<p style='color: #4b4e52;'>This user hasn't unboxed any skins yet.</p>";
        }

        data.items.forEach(item => {
          totalVal += item.estimated_value;
          
          // Split the name if it contains " | " (e.g. "AK-47 | Inheritance")
          const nameParts = item.skin_name.split(" | ");
          const type = nameParts[0] || "Item";
          const skin = nameParts[1] || "";

          const div = document.createElement("div");
          div.className = `item-card rarity-${item.skin_rarity}`;
          div.innerHTML = `
            <span class="item-name">${type}</span>
            <span class="item-type">${skin}</span>
            <span class="item-val">$${item.estimated_value.toFixed(2)}</span>
          `;
          list.appendChild(div);
        });

        document.getElementById("stats-summary").innerText = `Collection Size: ${data.items.length} items`;
        document.getElementById("total-val-display").innerText = `$${totalVal.toFixed(2)}`;

      } catch (err) {
        document.getElementById("user-title").innerText = "Profile Unavailable";
        document.getElementById("stats-summary").innerText = "Could not load this user's inventory.";
      }
    }

    loadUserInventory();
  </script>
</body>
</html>
