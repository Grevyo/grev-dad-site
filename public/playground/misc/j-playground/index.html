<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Template</title>

    <!-- Styles -->
    <style>
        :root {
            --bg: #0f172a;
            --fg: #e5e7eb;
            --accent: #3b82f6;
            --muted: #1f2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.6;
        }

        a {
            color: var(--fg);
            text-decoration: none;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--muted);
            position: sticky;
            top: 0;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Sections */
        section {
            padding: 4rem 2rem;
            max-width: 1000px;
            margin: auto;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            background: var(--muted);
        }
    </style>
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
        <div class="logo">
            <a href="#">MyProject</a>
        </div>

        <nav class="nav-links">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- ================= MAIN ================= -->
    <main>

        <!-- Home Section -->
        <section id="home">
            <h1 class="section-title">Home</h1>
            <div class="home-content">
                <p>Landing / hero content goes here.</p>
            </div>
        </section>

        <!-- About Section -->
        <section id="about">
            <h2 class="section-title">About</h2>
            <div class="about-content">
                <p>Information about you or your project.</p>
            </div>
        </section>

        <!-- Services Section -->
        <section id="services">
            <h2 class="section-title">Services</h2>
            <div class="services-content">
                <p>Describe what you offer.</p>
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects">
            <h2 class="section-title">Projects</h2>
            <div class="projects-content">
                <p>Showcase your work.</p>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact">
            <h2 class="section-title">Contact</h2>
            <div class="contact-content">
                <p>Contact form or details go here.</p>
            </div>
        </section>

    </main>

    <!-- ================= FOOTER ================= -->
    <footer>
        <p>&copy; 2026 MyProject. All rights reserved.</p>
    </footer>

</body>
</html>
